name: Windows Roslyn shim check

on:
  push:

jobs:
  check:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install Roslyn language server
        shell: pwsh
        run: |
          dotnet --info
          dotnet tool install --global roslyn-language-server --prerelease
          "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Inspect Roslyn shim
        shell: pwsh
        run: |
          $toolDir = Join-Path $env:USERPROFILE ".dotnet\tools"
          $expectedCmd = Join-Path $toolDir "roslyn-language-server.cmd"

          Write-Host "USERPROFILE: $env:USERPROFILE"
          Write-Host "Tool dir: $toolDir"
          Write-Host "Expected cmd: $expectedCmd"
          Write-Host ""

          Write-Host "dotnet tool list --global"
          dotnet tool list --global
          Write-Host ""

          Write-Host "Tool directory contents"
          Get-ChildItem -Force $toolDir | Format-List Mode,Length,Name,FullName,LinkType,Target
          Write-Host ""

          Write-Host "Get-Command roslyn-language-server -All"
          Get-Command roslyn-language-server -All | Format-List Source,Path,CommandType,Definition
          Write-Host ""

          Write-Host "where.exe roslyn-language-server"
          where.exe roslyn-language-server
          Write-Host ""

          Write-Host "Expected cmd exists: $(Test-Path $expectedCmd)"
          Write-Host "roslyn-language-server --version"
          roslyn-language-server --version
          Write-Host ""

          Write-Host "Direct expected cmd --version"
          & $expectedCmd --version

          if (!(Test-Path $expectedCmd)) {
            throw "Expected shim was not found at $expectedCmd"
          }

      - name: Run easy-dotnet healthcheck
        shell: pwsh
        run: |
          dotnet build
          dotnet run --project ./EasyDotnet.IDE/EasyDotnet.IDE.csproj -- healthcheck --format markdown
          dotnet run --project ./EasyDotnet.IDE/EasyDotnet.IDE.csproj roslyn start 
