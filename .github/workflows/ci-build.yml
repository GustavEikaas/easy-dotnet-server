name: 🛠 CI build

on:
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  build-dncdbg-win:
    name: Build dncdbg (win-x64)
    runs-on: windows-2025

    steps:
      - name: Checkout dncdbg
        uses: actions/checkout@v4
        with:
          repository: viewizard/dncdbg
          ref: 2b11e4e6a9ed4c6eb8830852f6c7a8539aa5a527
          path: dncdbg

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Add Windows SDK tools to PATH (for mc.exe)
        shell: pwsh
        run: |
          $sdkRoot = "C:\Program Files (x86)\Windows Kits\10\bin"
          $sdkVersion = (Get-ChildItem $sdkRoot -Directory | Where-Object { $_.Name -match '^10\.' } | Sort-Object Name -Descending | Select-Object -First 1).Name
          $mcPath = Join-Path $sdkRoot "$sdkVersion\x64"
          Write-Host "Adding $mcPath to PATH"
          Get-ChildItem $mcPath -Filter mc.exe | ForEach-Object { Write-Host "Found: $($_.FullName)" }
          "$mcPath" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Configure dncdbg (Windows)
        shell: pwsh
        run: |
          cmake `
            -S dncdbg `
            -B dncdbg/build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$PWD\dncdbg\bin" `
            -DDOTNET_DIR="$env:DOTNET_ROOT" `
            -DCMAKE_VS_GLOBALS="ResolveNuGetPackages=false;ResolvePackageAssets=false"

      - name: Build dncdbg (Windows)
        shell: pwsh
        run: cmake --build dncdbg/build --target install --parallel $env:NUMBER_OF_PROCESSORS --config Release -- /p:ResolveNuGetPackages=false

      - name: Verify dncdbg
        shell: bash
        run: |
          test -f "dncdbg/bin/dncdbg.exe"
          test -f "dncdbg/bin/ManagedPart.dll"
          "dncdbg/bin/dncdbg.exe" --version
