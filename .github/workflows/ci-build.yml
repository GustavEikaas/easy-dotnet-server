name: 🛠 CI build

on:
  pull_request:
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  build-dncdbg-win:
    name: Build dncdbg (win-x64)
    runs-on: windows-2025

    steps:
      - name: Checkout dncdbg
        uses: actions/checkout@v4
        with:
          repository: viewizard/dncdbg
          ref: 2b11e4e6a9ed4c6eb8830852f6c7a8539aa5a527
          path: dncdbg

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Patch dncdbg buildinfo.cpp for MSVC (extern vs constexpr linkage)
        shell: bash
        run: |
          sed -i 's/^constexpr std::string_view/extern constexpr std::string_view/' dncdbg/src/buildinfo.cpp
          grep -n "constexpr std::string_view" dncdbg/src/buildinfo.cpp

      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure dncdbg
        shell: pwsh
        run: |
          cmake `
            -S dncdbg `
            -B dncdbg/build `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$PWD\dncdbg\bin" `
            -DDOTNET_DIR="$env:DOTNET_ROOT"

      - name: Build dncdbg
        shell: pwsh
        run: cmake --build dncdbg/build --target install --parallel $env:NUMBER_OF_PROCESSORS --config Release -- /p:ResolveNuGetPackages=false

      - name: Verify dncdbg
        shell: bash
        run: |
          test -f "dncdbg/bin/dncdbg.exe"
          test -f "dncdbg/bin/ManagedPart.dll"
          "dncdbg/bin/dncdbg.exe" --version
