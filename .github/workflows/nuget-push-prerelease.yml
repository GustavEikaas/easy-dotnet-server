name: 🚀 Publish Prerelease .NET Tool to NuGet

on:
  workflow_dispatch:
    inputs:
      versionSuffix:
        description: 'Version suffix for prerelease (e.g., alpha, beta, rc1)'
        required: true
        default: 'alpha'

      notifyDiscord:
        description: 'Notify Discord?'
        type: boolean
        required: true
        default: false

      discordMessage:
        description: 'Discord message'
        type: string
        required: false
        default: ''

permissions:
  id-token: write

jobs:
  publish-prerelease:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Release Assets
        uses: ./.github/actions/build-release-assets

      - name: Resolve version
        id: get_version
        run: |
          VERSION=$(dotnet msbuild ./EasyDotnet.IDE/EasyDotnet.IDE.csproj -getProperty:Version)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Pack with prerelease suffix
        run: |
          dotnet pack ./EasyDotnet.IDE \
            -p:PackageVersion=${{ steps.get_version.outputs.version }}-${{ github.event.inputs.versionSuffix }}

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: GustavEikaas

      - name: Push to NuGet (ignore conflict errors)
        run: |
          dotnet nuget push EasyDotnet.IDE/bin/Release/*.nupkg \
            --api-key ${{steps.login.outputs.NUGET_API_KEY}}   \
            --source https://api.nuget.org/v3/index.json

      - name: Notify Discord
        if: ${{ inputs.notifyDiscord }}
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          VERSION: ${{ steps.get_version.outputs.version }}
          VERSION_SUFFIX: ${{ inputs.versionSuffix }}
          DISCORD_MESSAGE: ${{ inputs.discordMessage }}
        run: |
          PACKAGE_VERSION="$VERSION-$VERSION_SUFFIX"
          PACKAGE_URL="https://www.nuget.org/packages/EasyDotnet/$PACKAGE_VERSION"
          INSTALL_COMMAND="dotnet tool install --global EasyDotnet --version $PACKAGE_VERSION"

          jq -n \
            --arg title "🚀 EasyDotnet prerelease published" \
            --arg description "$DISCORD_MESSAGE" \
            --arg url "$PACKAGE_URL" \
            --arg version "$PACKAGE_VERSION" \
            --arg install "$INSTALL_COMMAND" \
            '{
              embeds: [
                {
                  title: $title,
                  description: $description,
                  url: $url,
                  color: 5814783,
                  fields: [
                    {
                      name: "📦 Version",
                      value: "`\($version)`",
                      inline: true
                    },
                    {
                      name: "🔗 NuGet",
                      value: "[View package](\($url))",
                      inline: true
                    },
                    {
                      name: "🛠 Install",
                      value: "```\($install)```",
                      inline: false
                    }
                  ],
                  footer: {
                    text: "Published from GitHub Actions"
                  }
                }
              ]
            }' \
          | curl -fsSL \
              -H "Content-Type: application/json" \
              -d @- \
              "$DISCORD_WEBHOOK"
