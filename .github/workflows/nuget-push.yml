name: 📦Publish .NET Tool to NuGet

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

jobs:
  build-dncdbg:
    name: Build dncdbg (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-24.04
          - rid: linux-arm64
            os: ubuntu-24.04-arm
          - rid: osx-x64
            os: macos-15-intel
            cmakeArch: x86_64
          - rid: osx-arm64
            os: macos-15
            cmakeArch: arm64
          - rid: win-x64
            os: windows-2025-vs2026

    steps:
      - name: Checkout build-dncdbg action
        uses: actions/checkout@v4
        with:
          sparse-checkout: .github/actions/build-dncdbg
          sparse-checkout-cone-mode: false

      - name: Build dncdbg
        uses: ./.github/actions/build-dncdbg
        with:
          rid: ${{ matrix.rid }}
          cmakeArch: ${{ matrix.cmakeArch }}

      - name: Upload dncdbg artifact
        uses: actions/upload-artifact@v4
        with:
          name: easy-dotnet-dncdbg-${{ matrix.rid }}
          path: dncdbg/bin/**
          if-no-files-found: error

  publish:
    needs: build-dncdbg
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Download dncdbg artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: easy-dotnet-dncdbg-*
          path: artifacts/dncdbg
          merge-multiple: false

      - name: Build Release Assets
        uses: ./.github/actions/build-release-assets
        with:
          dncdbgArtifactsPath: artifacts/dncdbg

      - name: Pack
        run: dotnet pack ./EasyDotnet.IDE

      - name: Verify package assets
        run: |
          unzip -l EasyDotnet.IDE/bin/Release/*.nupkg | tee /tmp/easy-dotnet-package.txt
          for rid in linux-x64 linux-arm64 osx-x64 osx-arm64 win-x64; do
            grep -q "tools/dncdbg/$rid/" /tmp/easy-dotnet-package.txt
          done

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: GustavEikaas

      - name: Push to NuGet (ignore conflict errors)
        run: |
          dotnet nuget push EasyDotnet.IDE/bin/Release/*.nupkg \
            --api-key ${{steps.login.outputs.NUGET_API_KEY}}   \
            --source https://api.nuget.org/v3/index.json       \
            --skip-duplicate
