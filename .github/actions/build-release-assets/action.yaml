name: Build Release Assets
description: "Build .NET tool in Release and stage analyzer/debugger assets"

inputs:
  roslynatorVersion:
    description: 'Roslynator analyzer package version'
    required: true
    default: '4.15.0'
  toolsOutputPath:
    description: 'Where to copy tool assets inside project output'
    required: true
    default: './EasyDotnet.IDE/bin/Release/net8.0/Tools'
  netcoredbgVersion:
    description: 'netcoredbg release version'
    required: true
    default: '3.2.0-1092'
  netcoredbgOsxAmd64Version:
    description: 'netcoredbg release version used only for osx-amd64 (dropped in 3.2.0)'
    required: true
    default: '3.1.2-1054'
  sharpdbgVersion:
    description: 'SharpDbg.Cli dotnet tool version'
    required: true
    default: '0.1.2'
  dncdbgArtifactsPath:
    description: 'Path containing downloaded dncdbg platform artifacts'
    required: false
    default: ''

runs:
  using: "composite"
  steps:
    - name: Build Release
      shell: bash
      run: dotnet build -c Release --no-restore


    - name: Build and Copy Roslyn Assets
      shell: bash
      run: |
        ROSLYNATOR_VERSION="${{ inputs.roslynatorVersion }}"
        OUTPUT_PATH="${{ inputs.toolsOutputPath }}/Roslyn/Analyzers"
        EXTENSION_OUTPUT_PATH="${{ inputs.toolsOutputPath }}/Roslyn/Extensions/EasyDotnet"
        DEVKIT_OUTPUT_PATH="${{ inputs.toolsOutputPath }}/Roslyn/DevKit"

        mkdir -p "$OUTPUT_PATH"
        mkdir -p "$EXTENSION_OUTPUT_PATH"
        mkdir -p "$DEVKIT_OUTPUT_PATH"
        cp EasyDotnet.RoslynLanguageServices/bin/Release/net8.0/EasyDotnet.RoslynLanguageServices.dll "$EXTENSION_OUTPUT_PATH/"
        cp EasyDotnet.RoslynLanguageServices/bin/Release/net8.0/Microsoft.CodeAnalysis.ExternalAccess.Extensions.dll "$DEVKIT_OUTPUT_PATH/"

        mkdir -p artifacts/roslynator

        for pkg in Roslynator.Analyzers Roslynator.CodeFixes Roslynator.Refactorings; do
          echo "Downloading ${pkg} ${ROSLYNATOR_VERSION}..."
          curl -L -o "artifacts/roslynator/${pkg}.nupkg" \
            "https://www.nuget.org/api/v2/package/${pkg}/${ROSLYNATOR_VERSION}"
          mkdir -p "artifacts/roslynator/extracted/${pkg}"
          unzip -o "artifacts/roslynator/${pkg}.nupkg" -d "artifacts/roslynator/extracted/${pkg}"
          cp "artifacts/roslynator/extracted/${pkg}/analyzers/dotnet/roslyn4.7/cs/"*.dll "$OUTPUT_PATH/"
        done
        echo "✓ Analyzer assets copied to $OUTPUT_PATH"

    - name: Download and Extract netcoredbg
      shell: bash
      run: |
        NETCOREDBG_VERSION="${{ inputs.netcoredbgVersion }}"

        OUTPUT_PATH="${{ inputs.toolsOutputPath }}/netcoredbg"
        ARTIFACTS_DIR="artifacts/netcoredbg"

        mkdir -p "$ARTIFACTS_DIR"
        mkdir -p "$OUTPUT_PATH"

        # osx-amd64 is not part of netcoredbg 3.2.0+, so it is pulled separately
        # from an older release below.
        declare -A platforms=(
          ["linux-amd64"]="linux-x64"
          ["linux-arm64"]="linux-arm64"
          ["osx-arm64"]="osx-arm64"
          ["win64"]="win-x64"
        )

        # Download Samsung repo platforms
        for platform in "${!platforms[@]}"; do
          target_dir="${platforms[$platform]}"
          echo "Downloading netcoredbg for $platform..."

          if [[ "$platform" == "win64" || "$platform" == "osx-arm64" ]]; then
            curl -L -o "$ARTIFACTS_DIR/netcoredbg-${platform}.zip" \
              "https://github.com/Samsung/netcoredbg/releases/download/${NETCOREDBG_VERSION}/netcoredbg-${platform}.zip"
            unzip -q "$ARTIFACTS_DIR/netcoredbg-${platform}.zip" -d "$ARTIFACTS_DIR/${platform}"
          else
            curl -L -o "$ARTIFACTS_DIR/netcoredbg-${platform}.tar.gz" \
              "https://github.com/Samsung/netcoredbg/releases/download/${NETCOREDBG_VERSION}/netcoredbg-${platform}.tar.gz"
            mkdir -p "$ARTIFACTS_DIR/${platform}"
            tar -xzf "$ARTIFACTS_DIR/netcoredbg-${platform}.tar.gz" -C "$ARTIFACTS_DIR/${platform}"
          fi
          
          mkdir -p "$OUTPUT_PATH/${target_dir}"
          cp -r "$ARTIFACTS_DIR/${platform}/netcoredbg/"* "$OUTPUT_PATH/${target_dir}/"
          echo "✓ Extracted netcoredbg to $OUTPUT_PATH/${target_dir}"
        done

        # osx-amd64 was dropped in netcoredbg 3.2.0, so pull it from the legacy release
        OSX_AMD64_VERSION="${{ inputs.netcoredbgOsxAmd64Version }}"
        echo "Downloading netcoredbg (macOS amd64) from legacy release ${OSX_AMD64_VERSION}..."

        curl -L -o "$ARTIFACTS_DIR/netcoredbg-osx-amd64.tar.gz" \
          "https://github.com/Samsung/netcoredbg/releases/download/${OSX_AMD64_VERSION}/netcoredbg-osx-amd64.tar.gz"
        mkdir -p "$ARTIFACTS_DIR/osx-amd64"
        tar -xzf "$ARTIFACTS_DIR/netcoredbg-osx-amd64.tar.gz" -C "$ARTIFACTS_DIR/osx-amd64"
        mkdir -p "$OUTPUT_PATH/osx-x64"
        cp -r "$ARTIFACTS_DIR/osx-amd64/netcoredbg/"* "$OUTPUT_PATH/osx-x64/"
        echo "✓ Extracted netcoredbg (macOS amd64) to $OUTPUT_PATH/osx-x64"

        echo "All netcoredbg platforms bundled successfully!"

    - name: Download and Extract SharpDbg
      shell: bash
      run: |
        SHARPDBG_VERSION="${{ inputs.sharpdbgVersion }}"
        OUTPUT_PATH="${{ inputs.toolsOutputPath }}/sharpdbg"
        ARTIFACTS_DIR="artifacts/sharpdbg"

        mkdir -p "$ARTIFACTS_DIR"
        mkdir -p "$OUTPUT_PATH"

        echo "Downloading SharpDbg.Cli ${SHARPDBG_VERSION} from NuGet..."
        curl -L -o "$ARTIFACTS_DIR/sharpdbg.nupkg" \
          "https://www.nuget.org/api/v2/package/SharpDbg.Cli/${SHARPDBG_VERSION}"

        unzip -q -o "$ARTIFACTS_DIR/sharpdbg.nupkg" "tools/*/any/*" -d "$ARTIFACTS_DIR/extracted"
        PAYLOAD_DIR=$(dirname "$(find "$ARTIFACTS_DIR/extracted/tools" -name 'SharpDbg.Cli.dll' | head -n1)")
        if [[ -z "$PAYLOAD_DIR" || ! -f "$PAYLOAD_DIR/SharpDbg.Cli.dll" ]]; then
          echo "::error::SharpDbg.Cli.dll not found in downloaded package"
          exit 1
        fi

        cp -R "$PAYLOAD_DIR/." "$OUTPUT_PATH/"
        test -f "$OUTPUT_PATH/SharpDbg.Cli.dll"
        echo "✓ Extracted SharpDbg to $OUTPUT_PATH"

    - name: Copy dncdbg Assets
      if: ${{ inputs.dncdbgArtifactsPath != '' }}
      shell: bash
      run: |
        DNCDBG_ARTIFACTS_PATH="${{ inputs.dncdbgArtifactsPath }}"
        OUTPUT_PATH="${{ inputs.toolsOutputPath }}/dncdbg"

        if [[ ! -d "$DNCDBG_ARTIFACTS_PATH" ]]; then
          echo "::error::dncdbg artifacts path does not exist: $DNCDBG_ARTIFACTS_PATH"
          exit 1
        fi

        mkdir -p "$OUTPUT_PATH"

        found=0
        for artifact_dir in "$DNCDBG_ARTIFACTS_PATH"/easy-dotnet-dncdbg-*; do
          if [[ ! -d "$artifact_dir" ]]; then
            continue
          fi

          rid="${artifact_dir##*/easy-dotnet-dncdbg-}"
          target_dir="$OUTPUT_PATH/$rid"

          mkdir -p "$target_dir"
          cp -R "$artifact_dir"/. "$target_dir/"

          if [[ "$rid" == win-* ]]; then
            test -f "$target_dir/dncdbg.exe"
          else
            test -f "$target_dir/dncdbg"
            chmod +x "$target_dir/dncdbg"
          fi

          test -f "$target_dir/ManagedPart.dll"
          echo "✓ Copied dncdbg to $target_dir"
          found=$((found + 1))
        done

        if [[ "$found" -eq 0 ]]; then
          echo "::error::No dncdbg artifacts found under $DNCDBG_ARTIFACTS_PATH"
          exit 1
        fi
